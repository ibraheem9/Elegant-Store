name: elegant_store
description: "Abd Elhadi - Retail Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.4
  sqflite_common_ffi: ^2.3.4
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.5
  provider: ^6.1.2
  shimmer: ^3.0.0
  intl: ^0.20.2
  table_calendar: ^3.1.3
  fl_chart: ^0.66.0
  file_picker: ^8.3.7
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  shared_preferences: ^2.3.5
  local_auth: ^2.3.0
  flutter_localizations:
    sdk: flutter
  uuid: ^4.5.1
  dio: ^5.7.0
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.1
  workmanager: 0.9.0+3
  share_plus: ^10.1.4
  device_info_plus: ^11.2.0
  flutter_secure_storage: ^9.2.2
  pointycastle: ^3.9.1
  crypto: ^3.0.6
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

# ─── App Icon Configuration ───────────────────────────────────────────────────
# Uses app_icon.png (1248x1248, white background with rounded corners)
# as the single source for all platform icons.
# Android: generates ic_launcher.png for all mipmap density buckets
# iOS:     generates all required AppIcon sizes including 1024x1024 App Store icon
# Windows: generates app_icon.ico with embedded multi-size (16–256px)
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 48
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/
