name: elegant_store
description: "Elegant Store - Retail Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.4
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.1
  provider: ^6.0.0
  intl: ^0.20.2
  table_calendar: ^3.1.2
  fl_chart: ^0.66.0
  file_picker: ^8.0.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  shared_preferences: ^2.3.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
