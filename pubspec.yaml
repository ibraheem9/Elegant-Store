name: elegant_store
description: "Elegant Store - Retail Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.4
  sqflite_common_ffi: ^2.3.4
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.5
  provider: ^6.1.2
  shimmer: ^3.0.0
  intl: ^0.20.2
  table_calendar: ^3.1.3
  fl_chart: ^0.66.0
  file_picker: ^8.3.7
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  shared_preferences: ^2.3.5
  local_auth: ^2.3.0
  flutter_localizations:
    sdk: flutter
  uuid: ^4.5.1
  dio: ^5.7.0
  workmanager: 0.9.0+3
  share_plus: ^10.1.4
  device_info_plus: ^11.2.0
  flutter_secure_storage: ^9.2.2
  pointycastle: ^3.9.1
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
