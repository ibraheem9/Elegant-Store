name: elegant_store
description: "Elegant Store - Retail Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  
  # State Management
  provider: ^6.1.0
  
  # UI & Design
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  intl: ^0.19.0
  
  # Charts & Graphs
  fl_chart: ^0.65.0
  
  # HTTP (for future API integration)
  http: ^1.1.0
  
  # JSON serialization
  json_annotation: ^4.8.1
  
  # Local storage
  shared_preferences: ^2.2.0
  
  # Date picker
  table_calendar: ^3.0.9
  
  # PDF generation
  pdf: ^3.10.0
  printing: ^5.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Segoe UI
      fonts:
        - asset: assets/fonts/segoe_ui.ttf
